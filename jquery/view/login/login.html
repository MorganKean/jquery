<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Itim&display=swap" rel="stylesheet">
    <title>Tela de Login com JQuery</title>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>

        <div class="campo">
                <label for="email">E-mail</label>
                <input type="text" id="email" placeholder="exemplo@email.com" >
        </div>

        <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" >
        </div>

        <div class="campo">
            <div class="termos">
                <label for="termoUso">
                    <input type="checkbox" id="termoUso">
                    Manter termos de uso
                </label>
            </div>
        </div>

        <div class="campo">
            <div class="termos">
                <label for="dadosAcesso">
                    <input type="checkbox" id="dadosAcesso">
                    Salvar dados de acesso
                </label>
            </div>
        </div>

        

        <button id="btnLogin">Entrar</button>

        <p>Não tem uma conta? <a  href="#" id="cadastro" onclick="navCadastro()">Cadastre-se</a></p>

        <p class="mensagem" id="mensagem"></p>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
